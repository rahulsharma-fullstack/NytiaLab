services:
  postgres:
    image: postgres:16-alpine
    container_name: nytia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nytia_dev
      POSTGRES_USER: nytia_user
      POSTGRES_PASSWORD: local_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nytia_user -d nytia_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: nytia_postgres_data